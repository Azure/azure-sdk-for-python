name: Chronus Verify

on:
  pull_request:
    branches: [main]
    paths:
      - "sdk/*/*/**"

jobs:
  chronus-verify:
    name: Verify Chronus Change Descriptions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed so chronus can diff against base branch

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install chronus
        run: npm install -g @chronus/chronus

      - name: Run chronus verify
        run: chronus verify
