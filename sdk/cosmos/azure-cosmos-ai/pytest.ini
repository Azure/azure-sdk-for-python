[pytest]
# All tests under sdk/cosmos/ run through the shared cosmos-sdk-client pipeline
# template, which filters via `-m cosmosEmulator`. azure-cosmos-ai's unit tests
# are fully mocked and do not require the Cosmos emulator, but they still need
# to be collected by that filter — so we register the marker here (to silence
# pytest's unknown-marker warning) and apply it module-wide in each test file.
markers =
    cosmosEmulator: marks tests as part of the cosmos service test umbrella (azure-cosmos-ai tests do not actually require the emulator).
asyncio_mode = auto
