[build-system]
requires = [
    "setuptools>=77.0.3",
    "wheel",
]
build-backend = "setuptools.build_meta"

[project]
name = "azure-eventhub-checkpointstoretable"
authors = [
    { name = "Microsoft Corporation", email = "azuresdkengsysadmins@microsoft.com" },
]
description = "Microsoft Azure Event Hubs checkpointer implementation with Azure Table Storage Client Library for Python"
license = "MIT"
classifiers = [
    "Development Status :: 7 - Inactive",
    "Programming Language :: Python",
    "Programming Language :: Python :: 2",
    "Programming Language :: Python :: 2.7",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.6",
    "Programming Language :: Python :: 3.7",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
]
requires-python = ">=3.9"
keywords = [
    "azure",
    "azure sdk",
]
dependencies = [
    "azure-core<2.0.0,>=1.14.0",
    "azure-eventhub<6.0.0,>=5.0.0",
    "msrest>=0.6.21",
    "azure-eventhub<6.0.0,>=5.0.0",
]
dynamic = [
    "version",
    "readme",
]

[project.optional-dependencies]
":python_version<'3.0'" = [
    "futures",
    "azure-data-nspkg<2.0.0,>=1.0.0",
]
":python_version<'3.4'" = [
    "enum34>=1.0.4",
]
":python_version<'3.5'" = [
    "typing",
]

[project.urls]
repository = "https://github.com/Azure/azure-sdk-for-python"

[tool.azure-sdk-build]
mypy = false
pyright = false
type_check_samples = false
verifytypes = false
pylint = false
black = false
ci_enabled = false

[tool.setuptools.dynamic.version]
attr = "azure.eventhub.extensions.checkpointstoretable._version.VERSION"

[tool.setuptools.dynamic.readme]
file = [
    "README.md",
]
content-type = "text/markdown"

[tool.setuptools.packages.find]
exclude = [
    "tests",
    "samples",
    "azure",
    "azure.eventhub",
    "azure.eventhub.extensions",
]

[tool.setuptools.package-data]
pytyped = [
    "py.typed",
]

[packaging]
auto_update = false
