[build-system]
requires = ["setuptools>=77.0.3", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "azure-ai-evaluation"
authors = [
  { name = "Microsoft Corporation", email = "azpysdkhelp@microsoft.com" },
]
description = "Microsoft Azure Evaluation Library for Python"
license = "MIT"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Operating System :: OS Independent",
]
requires-python = ">=3.9"
keywords = [
    "azure",
    "azure sdk",
]
version = "1.16.7"
dependencies = [
    "pyjwt>=2.8.0",
    "azure-identity>=1.19.0",
    "azure-core>=1.31.0",
    "nltk>=3.9.1",
    "azure-storage-blob>=12.19.0",
    "httpx>=0.27.2,<1",
    "pandas>=2.1.2,<3.0.0;python_version<\"3.13\"",
    "pandas>=2.2.3,<3.0.0;python_version==\"3.13\"",
    "pandas>=2.3.3,<3.0.0;python_version>=\"3.14\"",
    "openai>=1.108.0",
    "ruamel.yaml>=0.17.10,<1.0.0",
    "msrest>=0.6.21",
    "Jinja2>=3.1.6",
    "aiohttp>=3.0",
]

[project.optional-dependencies]
redteam = [
    'pyrit==0.11.0;python_version>="3.10"',
]
opentelemetry = [
    "opentelemetry-sdk>=1.17.0,<1.39.0",
    "azure-monitor-opentelemetry-exporter>=1.0.0b17",
]
dynamic = ["readme"]

[project.urls]
repository = "https://github.com/Azure/azure-sdk-for-python"

[tool.setuptools.dynamic]
readme = {file = [
    "README.md",
    "CHANGELOG.md",
], content-type = "text/markdown"}

[tool.setuptools.packages.find]
exclude = [
    "azure",
    "azure.ai",
    "doc*",
    "generated_samples*",
    "generated_tests*",
    "samples*",
    "swagger*",
    "tests*",
]

[tool.setuptools.package-data]
pytyped = ["py.typed"]

[tool.azure-sdk-build]
mypy = false
pyright = false
pylint = false
black = true
verifytypes = false
whl_no_aio = false

[tool.azure-sdk-conda]
in_bundle = false
