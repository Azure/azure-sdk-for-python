[build-system]
requires = ["setuptools>=77.0.3", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "azure-maps-geolocation"
authors = [
  { name = "Microsoft Corporation", email = "azpysdkhelp@microsoft.com" },
]
description = "Microsoft Azure Maps Geolocation Client Library for Python"
license = "MIT"
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.8"
keywords = [
    "azure",
    "azure sdk",
]
version = "1.0.0b4"
dependencies = [
    "msrest>=0.6.21",
    "azure-common~=1.1",
    "azure-mgmt-core<2.0.0,>=1.3.0",
]
dynamic = ["readme"]

[project.urls]
repository = "https://github.com/Azure/azure-sdk-for-python/tree/main/sdk/maps/azure-maps-geolocation"

[tool.setuptools.dynamic]
readme = {file = [
    "README.md",
    "CHANGELOG.md",
], content-type = "text/markdown"}

[tool.setuptools.packages.find]
exclude = [
    "azure",
    "azure.maps",
    "doc*",
    "generated_samples*",
    "generated_tests*",
    "samples*",
    "swagger*",
    "tests*",
]

[tool.setuptools.packages.find]
exclude = [
    "azure",
    "azure.maps",
    "tests",
]

[tool.azure-sdk-build]
pyright = false
ci_enabled = true
