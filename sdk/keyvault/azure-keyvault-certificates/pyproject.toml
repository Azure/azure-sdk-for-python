[build-system]
requires = [
    "setuptools>=61.0.0",
    "wheel",
]
build-backend = "setuptools.build_meta"

[project]
name = "azure-keyvault-certificates"
authors = [
    { name = "Microsoft Corporation", email = "azpysdkhelp@microsoft.com" },
]
description = "Microsoft Corporation Key Vault Certificates Client Library for Python"
keywords = [
    "azure",
    "azure sdk",
]
requires-python = ">=3.9"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
]
dependencies = [
    "isodate>=0.6.1",
    "azure-core>=1.31.0",
    "typing-extensions>=4.6.0",
]
dynamic = [
    "version",
    "readme",
]

[project.license]
text = "MIT License"

[project.urls]
repository = "https://github.com/Azure/azure-sdk-for-python/tree/main/sdk"

[tool.setuptools.dynamic.version]
attr = "azure.keyvault.certificates._version.VERSION"

[tool.setuptools.dynamic.readme]
file = [
    "README.md",
    "CHANGELOG.md",
]
content-type = "text/markdown"

[tool.setuptools.packages.find]
exclude = [
    "samples*",
    "tests*",
    "azure",
    "azure.keyvault",
]

[tool.setuptools.package-data]
pytyped = [
    "py.typed",
]

[tool.azure-sdk-build]
pyright = false

[tool.uv.sources.azure-core]
path = "../../core/azure-core"

[tool.uv.sources.azure-identity]
path = "../../identity/azure-identity"

[tool.uv.sources.azure-keyvault-nspkg]
path = "../../nspkg/azure-keyvault-nspkg"

[tool.uv.sources.azure-sdk-tools]
path = "../../../eng/tools/azure-sdk-tools"

[tool.azure-sdk-conda]
in_bundle = true
bundle_name = "azure-keyvault"

[dependency-groups]
dev = [
    "aiohttp>=3.0",
    "azure-core",
    "azure-identity",
    "azure-keyvault-nspkg",
    "azure-sdk-tools",
    "parameterized>=0.7.3",
    "pyopenssl",
    "python-dateutil>=2.8.0",
]

[packaging]
auto_update = false
