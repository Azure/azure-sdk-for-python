[build-system]
requires = ["setuptools>=77.0.3", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "azure-digitaltwins-core"
authors = [
  { name = "Microsoft Corporation", email = "azpysdkhelp@microsoft.com" },
]
description = "Microsoft Azure Azure DigitalTwins Core Client Library for Python"
license = "MIT"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.7",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
]
requires-python = ">=3.7"
keywords = [
    "azure",
    "azure sdk",
]
version = "1.3.0"
dependencies = [
    "azure-core<2.0.0,>=1.29.0",
    "isodate>=0.6.1",
]
dynamic = ["readme"]

[project.urls]
repository = "https://github.com/Azure/azure-sdk-for-python/tree/main/sdk/digitaltwins/azure-digitaltwins-core"

[tool.setuptools.dynamic]
readme = {file = [
    "README.md",
    "CHANGELOG.md",
], content-type = "text/markdown"}

[tool.setuptools.package-data]
pytyped = ["py.typed"]

[tool.setuptools.packages.find]
exclude = [
    "azure",
    "azure.digitaltwins",
    "samples",
    "tests",
]

[tool.azure-sdk-build]
pyright = false

[tool.azure-sdk-conda]
in_bundle = false
