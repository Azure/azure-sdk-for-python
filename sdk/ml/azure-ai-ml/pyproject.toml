[build-system]
requires = ["setuptools>=77.0.3", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "azure-ai-ml"
authors = [
    { name = "Microsoft Corporation", email = "azuresdkengsysadmins@microsoft.com" },
]
description = "Microsoft Azure Machine Learning Client Library for Python"
license = "MIT"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
requires-python = ">=3.9"
keywords = ["azure", "azure sdk"]
dependencies = [
    "pyyaml>=5.1.0,<7.0.0",
    "azure-core>=1.23.0",
    "azure-mgmt-core>=1.3.0",
    "marshmallow>=3.5,<4.0.0",
    "jsonschema>=4.0.0,<5.0.0",
    "tqdm<5.0.0",
    "strictyaml<2.0.0",
    "colorama<1.0.0",
    "pyjwt<3.0.0",
    "azure-storage-blob>=12.10.0",
    "azure-storage-file-share",
    "azure-storage-file-datalake>=12.2.0",
    "pydash>=6.0.0,<9.0.0",
    "isodate<1.0.0",
    "typing-extensions<5.0.0",
    "azure-monitor-opentelemetry",
]
dynamic = ["version", "readme"]

[project.optional-dependencies]
designer = ["mldesigner"]
mount = ["azureml-dataprep-rslex>=2.22.0; python_version < '3.13'"]

[project.urls]
repository = "https://github.com/Azure/azure-sdk-for-python"
"Bug Reports" = "https://github.com/Azure/azure-sdk-for-python/issues"

[tool.setuptools.dynamic.version]
attr = "azure.ai.ml._version.VERSION"

[tool.setuptools.dynamic.readme]
file = ["README.md", "CHANGELOG.md"]
content-type = "text/markdown"

[tool.setuptools.packages.find]
exclude = [
    "tests*",
    "azure",
    "azure.ai",
]

[tool.setuptools.package-data]
"azure.ai.ml" = ["py.typed"]
"azure.ai.ml._arm_deployments.arm_templates" = ["*.json"]
"azure.ai.ml.entities._job.pipeline.data" = ["*.yml"]

[tool.azure-sdk-build]
mypy = true
pyright = false
type_check_samples = true
pylint = true
mindependency = false
latestdependency = false
black = true
absolute_cov = true
absolute_cov_percent = 65

[tool.isort]
profile = "black"
line_length = 120
known_first_party = ["azure"]
filter_files=true
extend_skip_glob = [
  "*/_vendor/*",
  "*/_generated/*",
  "*/_restclient/*",
  "*/doc/*",
  "*/.tox/*",
]

[tool.mypy]
python_version = "3.10"
exclude = [
  "azure/ai/ml/_restclient",
  "azure/ai/ml/_vendor/",
  "azure/ai/ml/_schema/",
  "azure/ai/ml/_arm_deployments/",
  "tests",
  "downloaded",
  "setup.py",
  "azure/ai/ml/_utils",
  "azure/ai/ml/exceptions.py",
  "azure/ai/ml/_exception_helper.py",
]
warn_unused_configs = true
follow_imports = "skip"
ignore_missing_imports = true
follow_imports_for_stubs = false

[tool.azure-sdk-conda]
in_bundle = false
