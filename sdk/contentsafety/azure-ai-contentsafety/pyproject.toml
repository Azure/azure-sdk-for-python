[build-system]
requires = ["setuptools>=77.0.3", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "azure-ai-contentsafety"
authors = [
  { name = "Microsoft Corporation", email = "azpysdkhelp@microsoft.com" },
]
description = "Microsoft Azure AI Content Safety Client Library for Python"
license = "MIT"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.7",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
]
requires-python = ">=3.7"
keywords = ["azure", "azure sdk"]

dependencies = [
    "isodate<1.0.0,>=0.6.1",
    "azure-core<2.0.0,>=1.28.0",
    "typing-extensions>=4.3.0; python_version<'3.8.0'",
]
dynamic = [
"version", "readme"
]

[project.urls]
repository = "https://github.com/Azure/azure-sdk-for-python/tree/main/sdk"

[tool.setuptools.dynamic]
version = {attr = "azure.ai.contentsafety._version.VERSION"}
readme = {file = ["README.md", "CHANGELOG.md"], content-type = "text/markdown"}

[tool.setuptools.packages.find]
exclude = [
    "tests*",
    "samples*",
    "azure",
    "azure.ai",
]

[tool.setuptools.package-data]
"azure.ai.contentsafety" = ["py.typed"]

[tool.azure-sdk-conda]
in_bundle = false
