# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.

parameters:
  - name: ReleaseToDevOpsOnly
    displayName: 'Release package to DevOps feed instead of PyPi'
    type: boolean
    default: false

trigger:
  branches:
    include:
    - main
    - hotfix/*
    - release/*
    - restapi*
  paths:
    include:
    - sdk/storage/
    - sdk/core/

pr:
  branches:
    include:
    - main
    - feature/*
    - hotfix/*
    - release/*
    - restapi*
  paths:
    include:
    - sdk/storage/
    - sdk/core/

extends:
  template: ../../eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    ${{ if eq(parameters.ReleaseToDevOpsOnly, 'true') }}:
      PublicFeed: 'public/storage-staging'
    ServiceDirectory: storage
    TestProxy: true
    TestTimeoutInMinutes: 120
    MatrixFilters:
      - PythonVersion=^(?!pypy3).*
    Artifacts:
    - name: azure-storage-blob
      safeName: azurestorageblob
