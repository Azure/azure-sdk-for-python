[build-system]
requires = [
    "setuptools>=77.0.3",
    "wheel",
]
build-backend = "setuptools.build_meta"

[project]
name = "azure-storage-blob-changefeed"
authors = [
    { name = "Microsoft Corporation", email = "ascl@microsoft.com" },
]
description = "Microsoft Azure Storage Blob ChangeFeed Client Library for Python"
license = "MIT"
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
requires-python = ">=3.9"
keywords = [
    "azure",
    "azure sdk",
]
dependencies = [
    "azure-storage-blob>=12.19.1,<13.0.0",
]
dynamic = [
    "version",
    "readme",
]

[project.urls]
repository = "https://github.com/Azure/azure-sdk-for-python/tree/main/sdk/storage/azure-storage-blob-changefeed"

[tool.azure-sdk-build]
mypy = true
pyright = false
type_check_samples = true
black = false

[tool.setuptools.dynamic.version]
attr = "azure.storage.blob.changefeed._version.VERSION"

[tool.setuptools.dynamic.readme]
file = [
    "README.md",
]
content-type = "text/markdown"

[tool.setuptools.package-data]
pytyped = [
    "py.typed",
]

[packaging]
auto_update = false
