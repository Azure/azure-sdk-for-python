[build-system]
requires = [
    "setuptools>=77.0.3",
    "wheel",
]
build-backend = "setuptools.build_meta"

[project]
name = "azure-storage-queue"
authors = [
    { name = "Microsoft Corporation", email = "ascl@microsoft.com" },
]
description = "Microsoft Azure Azure Queue Storage Client Library for Python"
license = "MIT"
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
requires-python = ">=3.9"
keywords = [
    "azure",
    "azure sdk",
]
dependencies = [
    "azure-core>=1.37.0",
    "cryptography>=2.1.4",
    "typing-extensions>=4.6.0",
    "isodate>=0.6.1",
]
dynamic = [
    "version",
    "readme",
]

[project.optional-dependencies]
aio = [
    "azure-core[aio]>=1.37.0",
]

[project.urls]
repository = "https://github.com/Azure/azure-sdk-for-python/tree/main/sdk/storage/azure-storage-queue"

[tool.azure-sdk-build]
mypy = true
pyright = false
type_check_samples = true
verifytypes = true
black = true

[tool.azure-sdk-conda]
in_bundle = true
bundle_name = "azure-storage"

[tool.setuptools.dynamic.version]
attr = "azure.storage.queue._version.VERSION"

[tool.setuptools.dynamic.readme]
file = [
    "README.md",
    "CHANGELOG.md",
]
content-type = "text/markdown"

[tool.setuptools.packages.find]
exclude = [
    "azure",
    "azure.storage",
    "tests",
    "tests.queue",
    "tests.common",
]

[packaging]
auto_update = false
