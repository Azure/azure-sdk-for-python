[build-system]
requires = ["setuptools>=77.0.3", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "azure-storage-file-share"
authors = [
  { name = "Microsoft Corporation", email = "azpysdkhelp@microsoft.com" },
]
description = "Microsoft Azure Azure File Share Storage Client Library for Python"
license = "MIT"
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
requires-python = ">=3.9"
keywords = [
    "azure",
    "azure sdk",
]
version = "12.27.0b1"
dependencies = [
    "azure-core>=1.37.0",
    "cryptography>=2.1.4",
    "typing-extensions>=4.6.0",
    "isodate>=0.6.1",
]

dynamic = ["readme"]
[project.optional-dependencies]
aio = [
    "azure-core[aio]>=1.37.0",
]

[project.urls]
repository = "https://github.com/Azure/azure-sdk-for-python/tree/main/sdk/storage/azure-storage-file-share"

[tool.setuptools.dynamic]
readme = {file = [
    "README.md",
    "CHANGELOG.md",
], content-type = "text/markdown"}

[tool.setuptools.packages.find]
exclude = [
    "azure",
    "azure.storage",
    "doc*",
    "generated_samples*",
    "generated_tests*",
    "samples*",
    "swagger*",
    "tests*",
]

[tool.azure-sdk-build]
mypy = true
pyright = false
type_check_samples = true
black = false

[tool.azure-sdk-conda]
in_bundle = true
bundle_name = "azure-storage"
