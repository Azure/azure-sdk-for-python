name: shared-prepare-release-plan-eval
description: Evaluation suite for release plan management skill.
skill: shared-prepare-release-plan
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
graders:
  - type: keyword
    name: mentions_release_plan
    config:
      keywords: ["release plan", "Service Tree", "API version"]
      must_include_all: false
  - type: regex
    name: references_tools
    config:
      pattern: "(?i)(azsdk_create_release_plan|azsdk_get_release_plan|azsdk_update_sdk_details|release plan)"
  - type: code
    name: has_substantive_output
    config:
      assertions:
        - "len(output) > 50"
tasks:
  - "tasks/*.yaml"
