parameters:
  - name: NameForReservation
    type: string
    default: 'auto'
  - name: VersionForReservation
    type: string
    default: '0.0.0'

jobs:
  - job: generate_namereserve_package
    displayName: Generate Name Reservation Package Artifacts
    pool:
      name: azsdk-pool
      image: windows-2022
      os: windows
    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: '3.13'

      - pwsh: |
          python -m pip install -r eng/ci_tools.txt
        displayName: Install Dependencies

      - ${{ if eq(parameters.NameForReservation, 'auto') }}:
        - name: generatePackages
          pwsh: |
            Write-Host "##vso[task.setvariable variable=HasPackages;isOutput=true]false"
            $ErrorActionPreference = 'Stop'

            # Step 1: Find azure-mgmt-* packages with version 1.0.0b1
            Write-Host "=== Step 1: Scanning for azure-mgmt-* packages with version 1.0.0b1 ==="
            $versionFiles = Get-ChildItem -Path "sdk/*/azure-mgmt-*" -Directory | ForEach-Object { Get-ChildItem -Path $_.FullName -Recurse -Filter "_version.py" }
            $candidatePackages = @()

            foreach ($file in $versionFiles) {
                $content = Get-Content $file.FullName -Raw
                if ($content -match 'VERSION\s*=\s*"1\.0\.0b1"') {
                    $parts = $file.FullName -replace '\\', '/' -split '/'
                    $pkgName = $null
                    foreach ($part in $parts) {
                        if ($part -like 'azure-mgmt-*') {
                            $pkgName = $part
                            break
                        }
                    }
                    if ($pkgName -and $candidatePackages -notcontains $pkgName) {
                        $candidatePackages += $pkgName
                        Write-Host "  Found: $pkgName ($($file.FullName))"
                    }
                }
            }

            Write-Host "`nTotal candidates with version 1.0.0b1: $($candidatePackages.Count)"

            if ($candidatePackages.Count -eq 0) {
                Write-Host "No packages to process."
                Write-Host "##vso[task.setvariable variable=HasPackages;isOutput=true]false"
                return
            }

            # Step 2: Check PyPI for each candidate package
            Write-Host "`n=== Step 2: Checking PyPI for unregistered packages ==="
            $unregisteredPackages = @()

            foreach ($pkg in $candidatePackages) {
                $pypiUrl = "https://pypi.org/pypi/$pkg/json"
                $maxAttempts = 3
                $attempt = 0
                $checked = $false

                while (-not $checked -and $attempt -lt $maxAttempts) {
                    $attempt += 1
                    try {
                        $response = Invoke-WebRequest -Uri $pypiUrl -Method Head -SkipHttpErrorCheck
                        if ($response.StatusCode -eq 404) {
                            $unregisteredPackages += $pkg
                            Write-Host "  NOT on PyPI: $pkg"
                        } else {
                            Write-Host "  Already on PyPI: $pkg (skipping, status code: $($response.StatusCode))"
                        }
                        $checked = $true
                    } catch {
                        if ($attempt -lt $maxAttempts) {
                            Write-Host "  PyPI check attempt $attempt for $pkg failed (`"$($_.Exception.Message)`"). Retrying..."
                            Start-Sleep -Seconds 5
                        } else {
                            Write-Host "  PyPI check failed for $pkg after $maxAttempts attempts (`"$($_.Exception.Message)`"). Skipping."
                            $checked = $true
                        }
                    }
                }
            }

            Write-Host "`nPackages to register: $($unregisteredPackages.Count)"

            if ($unregisteredPackages.Count -eq 0) {
                Write-Host "All packages are already registered on PyPI."
                Write-Host "##vso[task.setvariable variable=HasPackages;isOutput=true]false"
                return
            }

            Write-Host "##vso[task.setvariable variable=HasPackages;isOutput=true]true"

            # Step 3: Generate reservation packages
            Write-Host "`n=== Step 3: Generating name reservation packages ==="
            foreach ($pkg in $unregisteredPackages) {
                Write-Host "  Generating package for: $pkg"
                generate_namereserve_package `
                  --package_version "${{ parameters.VersionForReservation }}" `
                  --output_dir "$(Build.ArtifactStagingDirectory)" `
                  $pkg
            }

            Write-Host "`n=== Summary ==="
            Write-Host "Generated reservation packages for $($unregisteredPackages.Count) package(s)."
          displayName: Discover and Generate Name Reservation Packages

      - ${{ else }}:
        - name: generatePackages
          pwsh: |
            Write-Host "##vso[task.setvariable variable=HasPackages;isOutput=true]true"
            $ErrorActionPreference = 'Stop'
            $PSNativeCommandUseErrorActionPreference = $true

            generate_namereserve_package `
              --package_version "${{ parameters.VersionForReservation }}" `
              --output_dir "$(Build.ArtifactStagingDirectory)" `
              "${{ parameters.NameForReservation }}"
          displayName: Generate Name Reservation Package

      - template: /eng/common/pipelines/templates/steps/publish-1es-artifact.yml
        parameters:
          ArtifactPath: '$(Build.ArtifactStagingDirectory)'
          ArtifactName: 'NameReservePackage'
