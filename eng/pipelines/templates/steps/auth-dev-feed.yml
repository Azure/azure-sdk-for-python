parameters:
  DevFeedName: 'public/azure-sdk-for-python'

steps:
  - pwsh: |
      # For safety default to publishing to the private feed.
      # Publish to https://dev.azure.com/azure-sdk/internal/_packaging?_a=feed&feed=azure-sdk-for-python-pr
      $devopsFeedName = 'internal/azure-sdk-for-python-pr'
      if ('$(Build.Repository.Name)' -eq 'Azure/azure-sdk-for-python') {
        # Publish to https://dev.azure.com/azure-sdk/public/_packaging?_a=feed&feed=azure-sdk-for-python
        $devopsFeedName = '${{ parameters.DevFeedName }}'
      }
      echo "##vso[task.setvariable variable=DevFeedName]$devopsFeedName"
      echo "Using DevopsFeed = $devopsFeedName"
    displayName: Setup DevOpsFeedName

  - task: TwineAuthenticate@0
    displayName: 'Twine Authenticate to feed'
    inputs:
      artifactFeeds: $(DevFeedName)

  - task: PipAuthenticate@1
    displayName: 'Pip Authenticate to feed'
    inputs:
      artifactFeeds: $(DevFeedName)
      onlyAddExtraIndex: false

  # PipAuthenticate embeds credentials directly into PIP_INDEX_URL as https://build:<token>@host/...
  # UV doesn't read PIP_INDEX_URL or PIP_EXTRA_INDEX_URL, so we mirror the pip two-index setup:
  #   UV_INDEX_URL     = dev feed (primary, for azure-* dev builds)
  #   UV_EXTRA_INDEX_URL = PyPI (fallback, for everything else)
  # Without the PyPI fallback, packages absent from the dev feed get a 401/404 with no fallback.
  - pwsh: |
      if ($env:PIP_INDEX_URL) {
        Write-Host "##vso[task.setvariable variable=UV_INDEX_URL]$($env:PIP_INDEX_URL)"
        Write-Host "##vso[task.setvariable variable=UV_EXTRA_INDEX_URL]https://pypi.org/simple"
        Write-Host "UV_INDEX_URL configured from PIP_INDEX_URL with PyPI fallback"
      } else {
        Write-Host "##vso[task.logissue type=warning]PIP_INDEX_URL not set - UV will use default index"
      }
    displayName: 'Configure UV Authentication'
