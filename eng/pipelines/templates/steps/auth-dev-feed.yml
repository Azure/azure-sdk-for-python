parameters:
  DevFeedName: 'public/azure-sdk-for-python'

steps:
  - pwsh: |
      # For safety default to publishing to the private feed.
      # Publish to https://dev.azure.com/azure-sdk/internal/_packaging?_a=feed&feed=azure-sdk-for-python-pr
      $devopsFeedName = 'internal/azure-sdk-for-python-pr'
      if ('$(Build.Repository.Name)' -eq 'Azure/azure-sdk-for-python') {
        # Publish to https://dev.azure.com/azure-sdk/public/_packaging?_a=feed&feed=azure-sdk-for-python
        $devopsFeedName = '${{ parameters.DevFeedName }}'
      }
      echo "##vso[task.setvariable variable=DevFeedName]$devopsFeedName"
      echo "Using DevopsFeed = $devopsFeedName"
    displayName: Setup DevOpsFeedName

  - task: TwineAuthenticate@0
    displayName: 'Twine Authenticate to feed'
    inputs:
      artifactFeeds: $(DevFeedName)

  - task: PipAuthenticate@1
    displayName: 'Pip Authenticate to feed'
    inputs:
      artifactFeeds: $(DevFeedName)
      onlyAddExtraIndex: false

  # UV doesn't read .pypirc for credentials like pip does.
  # Convert the .pypirc credentials into a .netrc file that UV reads natively.
  - pwsh: |
      $pypircPath = Join-Path $HOME ".pypirc"
      if (-not (Test-Path $pypircPath)) {
        Write-Host "No .pypirc found, skipping UV auth configuration"
        return
      }

      $content = Get-Content $pypircPath -Raw
      # Extract username and password from the pypirc
      $username = $null
      $password = $null
      if ($content -match '(?m)^\s*username\s*=\s*(.+?)\s*$') { $username = $Matches[1] }
      if ($content -match '(?m)^\s*password\s*=\s*(.+?)\s*$') { $password = $Matches[1] }

      if ($username -and $password) {
        $netrcPath = Join-Path $HOME ".netrc"
        $entry = "machine pkgs.dev.azure.com`nlogin $username`npassword $password"
        Add-Content -Path $netrcPath -Value $entry
        Write-Host "Wrote .netrc entry for pkgs.dev.azure.com (UV auth)"
      } else {
        Write-Host "##vso[task.logissue type=warning]Could not extract credentials from .pypirc for UV"
      }

      # Also forward PIP_INDEX_URL so UV knows which index to use
      if ($env:PIP_INDEX_URL) {
        Write-Host "##vso[task.setvariable variable=UV_INDEX_URL]$($env:PIP_INDEX_URL)"
        Write-Host "UV_INDEX_URL set to: $($env:PIP_INDEX_URL)"
      }
    displayName: 'Configure UV Authentication'
