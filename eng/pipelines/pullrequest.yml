pr:
  branches:
    include:
    - main
    - feature/*
    - hotfix/*
    - release/*
    - restapi*
    - pipelinev3*
  paths:
    include:
    - "*"
parameters:
  - name: Service
    type: string
    default: auto

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-client.yml
  parameters:
    ServiceDirectory: ${{ parameters.Service }}
    BuildTargetingString: "*"
    TestProxy: true
    TestTimeOutInMinutes: 180
    ExcludePaths:
      - sdk/cosmos/
